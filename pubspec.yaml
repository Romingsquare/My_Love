name: chronos_archive
description: "A cinematic personal memory universe — your emotional time observatory."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local persistence — SharedPreferences + JSON (zero code-gen)
  shared_preferences: ^2.3.5

  # Animations
  flutter_animate: ^4.5.0

  # Audio
  just_audio: ^0.9.36

  # Image handling
  image_picker: ^1.1.2
  path_provider: ^2.1.5

  # Typography
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.5.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
